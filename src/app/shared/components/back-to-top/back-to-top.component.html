@if (isVisible) {
  <button (click)="scrollToTop()"
          class="fixed bottom-24 right-6 z-50 bg-primary w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:shadow-xl hover:scale-110 transition-all duration-300"
          aria-label="Retour en haut">
    <i class="fas fa-arrow-up text-white text-lg"></i>
  </button>
}
